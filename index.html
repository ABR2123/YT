<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Music Player</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="player">
            <div class="header">
                <h1>🎵 YouTube Music Player</h1>
            </div>

            <!-- Video Display -->
            <div class="video-container" id="videoContainer">
                <div id="player"></div>
            </div>

            <!-- Search Section -->
            <div class="search-section">
                <div class="search-box">
                    <input 
                        type="text" 
                        id="searchInput" 
                        placeholder="Search for songs, artists, or playlists..." 
                        class="search-input"
                    >
                    <button id="searchBtn" class="search-btn">Search</button>
                </div>
                <div id="searchResults" class="search-results"></div>
            </div>

            <!-- Now Playing -->
            <div class="now-playing">
                <div class="track-info">
                    <h2 id="trackTitle">No track playing</h2>
                    <p id="trackArtist">Select a song to play</p>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="time-display">
                    <span id="currentTime">0:00</span>
                    <span id="duration">0:00</span>
                </div>
            </div>

            <!-- Player Controls -->
            <div class="controls">
                <button id="prevBtn" class="control-btn" title="Previous">
                    <span>⏮️</span>
                </button>
                <button id="playBtn" class="control-btn play-btn" title="Play">
                    <span>▶️</span>
                </button>
                <button id="pauseBtn" class="control-btn pause-btn hidden" title="Pause">
                    <span>⏸️</span>
                </button>
                <button id="nextBtn" class="control-btn" title="Next">
                    <span>⏭️</span>
                </button>
                <div class="volume-control">
                    <span>🔊</span>
                    <input type="range" id="volumeSlider" min="0" max="100" value="70" class="volume-slider">
                </div>
            </div>

            <!-- Playlist -->
            <div class="playlist-section">
                <h3>Playlist</h3>
                <div id="playlist" class="playlist"></div>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="app.js"></script>
</body>
</html>
